<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internet Project Guide</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div id="shared-header"></div>

    <main>
        <h1 class="centered">The Molecular Basis of Virulence and Physiology in Mycobacteria</h1>
            <p class="centered">
                Our lab studies the genetic and biochemical basis of the ability of 
                mycobacteria to cause disease.
            </p>
            <img src="images/Faculty of Agriculture.jpg" width = "600" width="auto">
        
        <section>
            <h2>Comment Section</h2>

            <textarea id="comment-section" rows="10" readonly>Loading comments...</textarea>

            <form method="post" action="/api/comment">
                <p>
                    <label for="username">Username:</label>
                </p>
                <p>
                    <input id="username" name="username" type="text" required>
                </p>
                <p>
                    <label for="comment">New comment:</label>
                </p>
                <p>
                    <input id="comment" name="comment" type="text" required>
                </p>
                <p> <button type="submit">Post</button> </p>
            </form>
                
        </section>

    </main>

    <script src="script.js"></script>

    <div id="shared-footer"></div>
    
</body>
</html>
